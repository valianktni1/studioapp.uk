server {
    listen 8090;
    server_name _;

    set $video_secret "__NGINX_VIDEO_SECRET__";

    client_max_body_size 0;

    location /video/ {
        secure_link $arg_md5,$arg_expires;
        secure_link_md5 "$video_secret$uri$arg_expires";

        if ($secure_link = "") { return 403; }
        if ($secure_link = "0") { return 410; }

        alias /uploads/;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        types {
            video/mp4                mp4;
            video/quicktime          mov;
            video/webm               webm;
            video/x-msvideo          avi;
            video/x-matroska         mkv;
            video/mp2t               mts;
        }

        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

        if ($request_method = OPTIONS) { return 204; }
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
